name: Release plugin

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check source
        run: npm run lint

      - name: Build plugin
        run: npm run build

      - name: Verify release version
        run: >-
          node -e "const manifest = require('./manifest.json');
          const tag = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          if (manifest.version !== tag) {
            throw new Error('Tag ' + tag + ' does not match manifest ' + manifest.version);
          }"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            main.js
            manifest.json
